services:
  db:
    image: postgres:18.3
    container_name: "credets-db"
    restart: unless-stopped
    shm_size: 128mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./apps/backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - credets-network

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - credets-network

volumes:
  pgdata:

networks:
  credets-network:
    driver: bridge
